schema_version: "1.0"

extension:
  id: agent-context
  name: "Coding Agent Context"
  version: "1.0.0"
  description: "Manages coding agent context/instruction files (e.g., CLAUDE.md, copilot-instructions.md) with project-specific plan references and configurable markers"
  author: spec-kit-core
  repository: https://github.com/github/spec-kit
  license: MIT

requires:
  vipd_version: ">=1.0.0"
  speckit_version: ">=0.2.0"

provides:
  commands:
    - name: vipd.speckit.agent-context.update
      file: commands/vipd.speckit.agent-context.update.md
      description: "Refresh the managed Spec Kit section in the coding agent context file"

hooks:
  after_specify:
    command: vipd.speckit.agent-context.update
    optional: true
    description: "Refresh agent context after specification"
  after_plan:
    command: vipd.speckit.agent-context.update
    optional: true
    description: "Refresh agent context after planning"

tags:
  - "agent"
  - "context"
  - "core"
